name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      smoke_base_url:
        description: 'Base URL to smoke-test (post-deploy)'
        required: false
        default: 'https://www.getkaru.io'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Security audit
        run: npm audit --audit-level=high
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Translation parity
        run: node scripts/check-translations.js
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build

  # Post-deploy production smoke test. Run manually from the Actions tab after a
  # deploy (workflow_dispatch) — asserts the security-critical endpoints behave.
  smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test
        run: bash scripts/smoke.sh "${{ github.event.inputs.smoke_base_url }}"
